version: "2"
type: frontend
tech_stack:
  - TypeScript
  - Next.js (App Router)
  - Tailwind CSS
  - Framer Motion
  - Lucide React
routes:
  - path: /
    file: app/page.tsx
    auth_required: false
    description: Homepage and landing page.
  - path: /attractions
    file: app/attractions/page.tsx
    auth_required: false
    description: Attractions page detailing amusement features.
  - path: /events
    file: app/events/page.tsx
    auth_required: false
    description: Events page showing venues.
  - path: /overview
    file: app/overview/page.tsx
    auth_required: false
    description: Overview of the mall.
  - path: /retail
    file: app/retail/page.tsx
    auth_required: false
    description: Retail and shopping directory.
  - path: /sponsorships
    file: app/sponsorships/page.tsx
    auth_required: false
    description: Sponsorship opportunities.
features:
  - name: Global Navigation
    description: Main cinematic menu navigation linking pages
    files:
      - app/components/Navigation.tsx
    entry_route: /
    user_interactions:
      - Click hamburger menu icon to open navigation
      - Click navigation links
      - Close navigation
    api_calls: []
    auth_required: false
  - name: Availability Form Submission
    description: Form for sponsors or event planners to inquire availability
    files:
      - app/components/AvailabilityForm.tsx
    entry_route: /sponsorships
    user_interactions:
      - Fill form fields
      - Click submit button
    api_calls: []
    auth_required: false
known_limitations: []
